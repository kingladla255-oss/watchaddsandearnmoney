<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Pocket Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            min-height: 800px;
        }

        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-bg {
            background-color: #00bcd4;
            padding: 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            color: white;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .wallet-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .acc-num { color: #666; font-size: 13px; }
        .welcome-text { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .balance { font-size: 28px; font-weight: bold; color: #00bcd4; }
        .balance-label { font-size: 12px; color: #999; }

        .btn-withdraw {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px solid #4caf50;
            color: #4caf50;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .daily-task-banner {
            background: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin: 20px 0;
            font-weight: bold;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .grid-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .grid-item .icon { font-size: 24px; margin-bottom: 5px; }

        .section-title {
            color: #777;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .action-card {
            background: #00bcd4;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .back-btn {
            background: #333;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* Input Forms formatting */
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Ad Popups overlays simulation */
        .ad-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .ad-box {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff9800;
        }

        /* Spin wheel graphic design */
        #wheel-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 30px auto;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            transition: transform 3s ease-out;
            background: conic-gradient(
                #ffc107 0deg 60deg, #ff5722 60deg 120deg, 
                #4caf50 120deg 180deg, #00bcd4 180deg 240deg, 
                #9c27b0 240deg 300deg, #e91e63 300deg 360deg
            );
        }

        /* Quiz Box structure elements */
        .quiz-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 15px;
        }
        .quiz-option {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
        }

        .counter-badge {
            background: #ff5722;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- MAIN DASHBOARD PAGE -->
    <div id="main-page" class="page active">
        <div class="header-bg">
            <div class="user-profile">
                <div class="user-icon">👤</div>
                <h2>Cash Pocket</h2>
            </div>
            <div class="wallet-card">
                <div class="acc-num">Account number: 03065449531</div>
                <div class="welcome-text">Welcome, munna</div>
                <div class="balance">$<span id="main-balance">4.95000</span></div>
                <div class="balance-label">Earning Balance (Min. Withdraw: $5)</div>
                <div class="counter-badge" id="ads-counter-view">Ads Remaining Today: 50/50</div>
                <button class="btn-withdraw" onclick="navigateTo('withdraw-page')">💳 Withdraw Money</button>
            </div>
        </div>

        <div class="daily-task-banner">Do the daily task - Earn Unlimited</div>

        <!-- Upper Grid Area Content -->
        <div class="grid-container">
            <div class="grid-item" onclick="showAd('Offers Panel Ad Loading')">
                <div class="icon" style="color: red;">🏷️</div>
                <div>Offers</div>
            </div>
            <div class="grid-item" onclick="showAd('Video Task Ad Loading')">
                <div class="icon" style="color: blue;">🎬</div>
                <div>Videos</div>
            </div>
            <div class="grid-item" onclick="navigateTo('web-page')">
                <div class="icon" style="color: grey;">📋</div>
                <div>Web</div>
            </div>
            <div class="grid-item" onclick="showAd('Dashboard Ads Block')">
                <div class="icon" style="color: orange;">💰</div>
                <div>Ads</div>
            </div>
        </div>

        <div class="section-title">Earn Money With</div>

        <div class="action-card" onclick="showAd('Daily Reward Bonus Claim')">
            <span>🎁</span>
            <span>Collect your Daily Reward bonus !</span>
        </div>

        <!-- Lower Dynamic Cards Split Grid -->
        <div class="two-column">
            <div class="action-card" onclick="showAd('Pre-Spin Ad Screen', 'spin-page')">
                <span>🎡</span>
                <span>Spin Earn</span>
            </div>
            <div class="action-card" onclick="showAd('Pre-Quiz Ad Screen', 'games-page')">
                <span>🎮</span>
                <span>Play Games</span>
            </div>
        </div>
    </div>

    <!-- WITHDRAW CASH SYSTEM -->
    <div id="withdraw-page" class="page">
        <button class="back-btn" onclick="navigateTo('main-page')">⬅ Back</button>
        <h2>Withdraw Money</h2>
        <br>
        <div class="input-group">
            <label>Select Payment Method</label>
            <select id="withdraw-method">
                <option value="EasyPaisa">EasyPaisa</option>
                <option value="JazzCash">JazzCash</option>
            </select>
        </div>
        <div class="input-group">
