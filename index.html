<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashout - Watch & Earn</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2d2d2d; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; text-align: center; }
        button { width: 95%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        .wallet-box { background: linear-gradient(135deg, #1feb84, #00b359); color: black; padding: 25px; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(31, 235, 132, 0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding-top: 40px; z-index: 9999; }
        .ad-container { width: 100%; height: 280px; background: black; border-radius: 8px; overflow: hidden; margin: 15px 0; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">

    <!-- 1. LOGIN SCREEN -->
    <div id="authScreen" class="card">
        <h2>📱 Cashout Login</h2>
        <p style="color: #aaa; font-size: 14px;">Enter phone and password to create or login</p>
        <input type="number" id="phoneInput" placeholder="Mobile Number (e.g., 03001234567)">
        <input type="password" id="passInput" placeholder="Enter Password">
        <button id="authBtn" style="margin-top: 10px;">Login / Register</button>
    </div>

    <!-- 2. MAIN DASHBOARD -->
    <div id="mainDashboard" style="display: none;">
        
        <!-- Top Wallet -->
        <div class="wallet-box">
            <p style="margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Total Wallet Balance</p>
            <h1 style="margin: 5px 0 0 0; font-size: 38px;">$<span id="userBalance">0.00000</span></h1>
        </div>

        <!-- Progress Tracker -->
        <div class="card" style="margin-top: 15px; background: #1a1a1a;">
            <p style="margin: 0; font-size: 15px; color: #ccc;">Daily Ads Remaining: <strong id="adsLeft" style="color: #1feb84;">100</strong> / 100</p>
        </div>

        <!-- Play Ad Zone -->
        <div class="card">
            <button id="playAdBtn" style="background: #ffcc00; color: black; font-size: 18px;">🎥 Play Video Ad & Earn Money</button>
        </div>

        <!-- Smart Withdraw Panel -->
        <div id="withdrawSection" class="card" style="display: none; border-color: #00b359; background: #14291e;">
            <h3 style="color: #1feb84; margin-top: 0; font-size: 18px;">💳 $5 Threshold Reached!</h3>
            <p style="font-size: 13px; color: #ddd; margin-bottom: 15px;">Select your provider to instantly cash out $5.00</p>
            <button id="easyPaisaBtn" style="background: #28a745; margin-bottom: 12px;">Withdraw via EasyPaisa</button>
            <button id="jazzCashBtn" style="background: #dc3545;">Withdraw via JazzCash</button>
        </div>

    </div>

</div>

<!-- 3. AD MODAL WINDOW -->
<div id="adModal" class="modal">
    <div class="card" style="max-width: 400px; margin: 0 auto; background: #1e1e1e;">
        <h3 id="adStatus" style="margin-top: 5px; color: #1feb84;">Loading Live Video Ad...</h3>
        <h2 style="color: #ffcc00; margin: 10px 0;">Time Left: <span id="timer">30</span>s</h2>
        
        <!-- Adsterra Ad Frame -->
        <div class="ad-container">
            <iframe id="adIframe" src="" width="100%" height="100%" style="border: none;"></iframe>
        </div>

        <!-- Captcha System -->
        <div id="captchaSection" style="display: none; background: #2b2b2b; padding: 15px; border-radius: 8px; border: 1px solid #444;">
            <h4 style="margin: 0 0 10px 0; color: #00ffcc;">🤖 Captcha Verification</h4>
            <p style="font-size: 22px; margin: 5px 0; font-weight: bold;"><span id="num1"></span> + <span id="num2"></span> = ?</p>
            <input type="number" id="captchaInput" placeholder="Answer here" style="width: 70%; margin-bottom: 10px;">
            <button id="claimBtn" style="background: #28a745;">Claim Reward $0.00010</button>
        </div>
    </div>
</div>

<script>
// State Management
let balance = parseFloat(localStorage.getItem("balance")) || 0.00000;
let watchedAds = parseInt(localStorage.getItem("adsWatched")) || 0;
let isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
const DAILY_LIMIT = 100;
let adTimer, timeLeft, correctAnswer;

// 24 Hour Reset for Ads Limit
let today = new Date().toDateString();
if (localStorage.getItem("adDate") !== today) {
    localStorage.setItem("adDate", today);
    localStorage.setItem("adsWatched", 0);
    watchedAds = 0;
}

// Global UI Updater
function refreshUI() {
    if (isLoggedIn) {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("mainDashboard").style.display = "block";
        document.getElementById("userBalance").innerText = balance.toFixed(5);
        
        let remaining = DAILY_LIMIT - watchedAds;
        document.getElementById("adsLeft").innerText = remaining;
        
        if (remaining <= 0) {
            let btn = document.getElementById("playAdBtn");
            btn.innerText = "🚫 Today's Limit Reached!";
            btn.disabled = true;
        }

        // Auto Hide/Show EasyPaisa & JazzCash on $5 criteria
        if (balance >= 5.00000) {
            document.getElementById("withdrawSection").style.display = "block";
        } else {
            document.getElementById("withdrawSection").style.display = "none";
        }
    }
}
refreshUI();

// Mock Auth Function
document.getElementById("authBtn").addEventListener("click", function() {
    let phone = document.getElementById("phoneInput").value;
    let pass = document.getElementById("passInput").value;
    if (phone.length < 10 || pass.length < 4) {
        alert("Pehle sahi Phone Number aur Password enter karein!");
        return;
    }
    localStorage.setItem("isLoggedIn", "true");
    isLoggedIn = true;
    refreshUI();
});

// Ad Running Logic
document.getElementById("playAdBtn").addEventListener("click", function() {
    if (watchedAds >= DAILY_LIMIT) return;

    timeLeft = 30;
    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("adModal").style.display = "block";
    document.getElementById("captchaSection").style.display = "none";
    document.getElementById("adStatus").innerText = "Video Ad Is Running...";
    
    // IMPORTANT: Paste your real Adsterra Direct Link below
    let adsterraLink = "YOUR_ADSTERRA_DIRECT_LINK_HERE"; 
    document.getElementById("adIframe").src = adsterraLink;

    adTimer = setInterval(function() {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(adTimer);
            document.getElementById("adIframe").src = ""; // Safely stop ad
            showCaptcha();
        }
    }, 1000);
});

// Create Math Challenge
function showCaptcha() {
    document.getElementById("adStatus").innerText = "Solve Math to Unlock Earnings";
    document.getElementById("captchaSection").style.display = "block";
    let n1 = Math.floor(Math.random() * 10) + 1;
    let n2 = Math.floor(Math.random() * 10) + 1;
    correctAnswer = n1 + n2;
    document.getElementById("num1").innerText = n1;
    document.getElementById("num2").innerText = n2;
    document.getElementById("captchaInput").value = "";
}

// Reward Distribution Engine
document.getElementById("claimBtn").addEventListener("click", function() {
    let ans = parseInt(document.getElementById("captchaInput").value);
    if (ans === correctAnswer) {
        balance += 0.00010;
        watchedAds += 1;
        localStorage.setItem("balance", balance);
        localStorage.setItem("adsWatched", watchedAds);
        
        alert("Success! $0.00010 added to wallet.");
        document.getElementById("adModal").style.display = "none";
        refreshUI();
    } else {
        alert("Wrong answer! Generating new captcha.");
        showCaptcha();
    }
});

// Balance Auto Deduction System
function processWithdraw(method) {
    alert(`Withdrawal Request Sent via ${method}! $5.00 deducted.`);
    balance -= 5.00000;
    localStorage.setItem("balance", balance);
    refreshUI();
}
document.getElementById("easyPaisaBtn").addEventListener("click", () => processWithdraw("EasyPaisa"));
document.getElementById("jazzCashBtn").addEventListener("click", () => processWithdraw("JazzCash"));
</script>

</body>
</html>
